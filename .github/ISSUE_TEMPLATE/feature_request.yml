name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: input
    id: plugin
    attributes:
      label: Plugin or area
      placeholder: status-line, marketplace docs, new plugin idea
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, command, config, or documentation you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful if there are tradeoffs or prior attempts.
